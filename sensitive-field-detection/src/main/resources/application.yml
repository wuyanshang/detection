# 多模型配置：可配置多个模型，按名称引用
models:
  configs:
    - name: qwen-plus
      api-key: your-api-key-1
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-plus
    - name: qwen-turbo
      api-key: your-api-key-2
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-turbo
    - name: deepseek
      api-key: your-api-key-3
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat
  # 当前使用的模型名称，对应上面 configs 中的 name
  active: qwen-plus

# 业务配置
sensitive-detection:
  max-retries: 3
  # 输出文件路径
  output-file: output/detection_result.xlsx

# 排除 JDBC 自动配置：缓存关闭时无需数据源也能正常启动；
# 启用缓存时由 AmbiguityCacheDbConfig 自建数据源，不依赖这些自动配置。
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# 歧义检测结果缓存（落库）。enabled=false 时不需要数据库。
ambiguity:
  cache:
    enabled: false
    datasource:
      url: jdbc:mysql://localhost:3306/datacheck?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: root
      password: your-password
      driver-class-name: com.mysql.cj.jdbc.Driver

# ============================================================
# 安全分类分级（对应设计文档）。
# 应用启动不依赖 ES/DB；仅当调用 /api/security/classify 时才访问 ES 与 LLM。
# 敏感信息（ES 密码、API Key）建议用环境变量注入。
# ============================================================
elasticsearch:
  host: ${ES_HOST:http://127.0.0.1:9200}
  username: ${ES_USERNAME:}
  password: ${ES_PASSWORD:}
  index: safe_all_topic

embedding:
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api-key: ${DASHSCOPE_API_KEY:}
  model: text-embedding-v4
  dimension: 1024
  cache:
    enabled: true
    max-size: 10000

security-classification:
  vector-search:
    top-k: 10
    num-candidates: 100
    min-score: 0.65
  bm25-search:
    top-k: 10
  cache:
    cache-null-result: false
    rule-version: v1
    ttl-hours: 0
  synonym:
    mode: replace          # replace 替换 / expand 扩展查询
  max-retries: 3
  llm-concurrency-limit: 5
  batch-size-limit: 500
  latch-timeout-minutes: 5
  # 结果缓存表 + 同义词规则表的数据库；enabled=false 时不读写库、不需数据源。
  db:
    enabled: false
    datasource:
      url: jdbc:mysql://localhost:3306/datacheck?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: root
      password: your-password
      driver-class-name: com.mysql.cj.jdbc.Driver

# ============================================================
# classify-v2（新增，独立于上面的 security-classification）。
# 接口：/api/security/v2/classify-table、/api/security/v2/classify-field。
# 指向新索引 safe_all_topic_v2（含 content/example/定义），复用 elasticsearch.* 连接信息。
# ============================================================
classify-v2:
  index: safe_all_topic_v2
  table-infer-enabled: true      # 表级含义推断（锁定主体）
  subject-consistency: true      # 判定时主体一致性约束
  vector-search:
    top-k: 25
    num-candidates: 300
    min-score: 0.0        # 评测期设 0：保证 FALLBACK 有候选可挑；标注集回调后再上调
  bm25-search:
    top-k: 25
  max-retries: 3
  concurrency-limit: 5
  columns-limit: 500
  latch-timeout-minutes: 5
